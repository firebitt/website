<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Firebitt - Coming Soon</title>
    <meta name="description" content="Firebitt is coming soon.">
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --text: #fff;
        --muted: #a8a8a8;
        --gold: #ffd83d;
        --amber: #ff9d18;
        --ember: #ff4d10;
        --line: rgba(255, 255, 255, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          radial-gradient(circle at 50% 32%, rgba(255, 157, 24, 0.18), transparent 22rem),
          radial-gradient(circle at 50% 66%, rgba(255, 216, 61, 0.1), transparent 26rem),
          linear-gradient(145deg, #191919 0%, var(--bg) 48%, #101010 100%);
        background-size: 58px 58px, 58px 58px, auto, auto, auto;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body::before,
      body::after {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
      }

      body::before {
        background:
          linear-gradient(115deg, transparent 0 44%, rgba(255, 216, 61, 0.12) 44.2% 44.4%, transparent 44.7%),
          linear-gradient(115deg, transparent 0 57%, rgba(255, 77, 16, 0.1) 57.2% 57.35%, transparent 57.65%);
        mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 78%, transparent);
      }

      body::after {
        background:
          radial-gradient(circle at center, transparent 0 32%, rgba(0, 0, 0, 0.38) 70%),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.05), transparent 18%, transparent 82%, rgba(0, 0, 0, 0.46));
      }

      main {
        display: grid;
        position: relative;
        z-index: 1;
        width: min(92vw, 760px);
        justify-items: center;
        gap: clamp(1.25rem, 3vw, 2rem);
        padding: clamp(1.5rem, 5vw, 4.5rem);
        text-align: center;
      }

      footer {
        position: fixed;
        z-index: 1;
        right: 1rem;
        bottom: 1rem;
        left: 1rem;
        color: rgba(255, 255, 255, 0.58);
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1.4;
        text-align: center;
        text-transform: uppercase;
      }

      .logo {
        width: min(64vw, 360px);
        height: auto;
        border-radius: 50%;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.06),
          0 0 0 10px rgba(255, 255, 255, 0.018),
          0 2rem 5rem rgba(0, 0, 0, 0.72),
          0 0 4.5rem rgba(255, 111, 16, 0.18);
      }

      h1 {
        margin: 0;
        background:
          linear-gradient(rgba(255, 216, 61, 0.22), rgba(255, 77, 16, 0.18)),
          url("assets/firebitt-field.jpg") center 52% / cover;
        color: transparent;
        font-size: clamp(3.1rem, 10vw, 7.4rem);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.82;
        text-transform: uppercase;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-stroke: clamp(1px, 0.1vw, 2px) rgba(255, 255, 255, 0.84);
        filter:
          drop-shadow(0 0.075em 0 #000)
          drop-shadow(0 0 1.7rem rgba(255, 77, 16, 0.28));
      }

      h1::selection {
        background: var(--gold);
        color: #080808;
      }

      .status {
        display: inline-grid;
        grid-auto-flow: column;
        align-items: center;
        gap: 0.65rem;
        min-height: 2.25rem;
        padding: 0.45rem 0.95rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(7, 7, 7, 0.68);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .status::before {
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 999px;
        background: var(--gold);
        box-shadow: 0 0 1.2rem var(--amber);
        content: "";
      }

      .stripe {
        width: min(72vw, 480px);
        height: 10px;
        border-radius: 999px;
        background:
          repeating-linear-gradient(
            135deg,
            var(--gold) 0 24px,
            #050505 24px 42px
          );
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.06),
          0 0 1.7rem rgba(255, 216, 61, 0.2);
      }

      .launch-line {
        width: min(74vw, 520px);
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
      }

      @media (max-width: 520px) {
        body {
          overflow: auto;
        }

        main {
          min-height: 100vh;
          align-content: center;
          gap: 1rem;
          padding-bottom: 5rem;
        }

        .logo {
          width: min(72vw, 280px);
        }

        h1 {
          font-size: clamp(3rem, 18vw, 4.6rem);
        }

        footer {
          font-size: 0.68rem;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="Firebitt coming soon">
      <div class="status">Launch sequence active</div>
      <img class="logo" src="assets/firebitt-logo.png" alt="Firebitt">
      <div class="launch-line" aria-hidden="true"></div>
      <h1>Coming Soon!</h1>
      <div class="stripe" aria-hidden="true"></div>
    </main>
    <footer>Built by SSMK Consulting LLC &quot;we think big&quot;</footer>
  </body>
</html>
